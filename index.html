<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势交互</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #startBtn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px; color:#fff; border:1px solid #fff; z-index:999; cursor:pointer; }
    </style>
</head>
<body>
    <div id="startBtn">点击启动手势</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let finger = {x:0, y:0};
        
        // 初始化手势识别
        const hands = new Hands({locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.onResults(res => { if(res.multiHandLandmarks?.length) { finger.x = res.multiHandLandmarks[0][8].x * canvas.width; finger.y = res.multiHandLandmarks[0][8].y * canvas.height; } });

        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startBtn').style.display = 'none';
            const video = document.createElement('video');
            const camera = new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 });
            await camera.start();
        };

        // 简单的粒子跟随逻辑
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            // 这里你可以添加你之前写的粒子绘制代码
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
